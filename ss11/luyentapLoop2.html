<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loop 2</title>
</head>
<body>
    <button onclick="prinftFibonaci()">Bài 1: Nhấn để in dãy Fibonaci</button>
    <p id="result"></p>
    <button onclick="bai2GiaiThua()">Bài 2: Tính giai thừa của một số nguyên dương</button>
    <p id="resultGiaiThua"></p>
    <button onclick="bai3PrinftTriger()">Bài 3: In tam giác vuông. Các góc vuông nằm ở các vị trí khác nhau</button>
    <p id="resultTamGiac"></p>
    <button onclick="bai4PrinftChuNhat()">Bài 4: In hình chữ nhật</button>
    <button onclick="bai5CountTax()">Bài 5: Viết chương trình tính lãi ngân hàng </button>
    <button onclick="bai6PrinftHeart()">Bài 6: In hình trái tim</button>
</body>
<script>
    function prinftFibonaci(){
        let count = 0;
        let num1 = 0;
        let num2 = 1;
        let soFibonacci = 0;
        let daySoFibonaci = [];
        let i = 0;
        while (count < 20) {
            for (i; i <= 20; i++) {
                    soFibonacci = num1 + num2;
                    daySoFibonaci.push(soFibonacci)
                    num1 = num2;
                    num2 = soFibonacci;
                    count++;
            }
            document.getElementById("result").innerHTML = `Dãy 20 số Fibonaci là: ${daySoFibonaci}`;
        }

    }
    function bai2GiaiThua(){
        let soNguyen = +prompt("Nhập vào số nguyên dương cần tính giai thừa");
        let result = 1 ;
        while (isNaN(soNguyen) || soNguyen < 0){
            soNguyen = +prompt("Bạn phải nhập đúng số nguyên dương là số lơn hơn 0");
        }
        if (soNguyen == 0 || soNguyen == 1){
            console.log(result);
            document.getElementById("resultGiaiThua").innerHTML = `${soNguyen}! bằng  ${result} `
        } else {
            for (let i = 1; i <= soNguyen; i++){
                result = result * i;
            }
            document.getElementById("resultGiaiThua").innerHTML = `${soNguyen}! bằng  ${result} `
        }
    }
    function bai3PrinftTriger(){

        for(let i = 0; i <= 5; i++ ){
            for(let j = 0; j <= i; j++){
                let start = "*";
                document.getElementById("resultTamGiac").innerHTML = start;
                }
            }
        }

    function bai4PrinftChuNhat(){}
    function bai5CountTax(){}
    function bai6PrinftHeart(){}
</script>
</html>
