  class Person {
    id;
    name;
    address;
    phone;
    constructor(id, name, address, phone) {
      this.id = id;
      this.name = name;

    }
  }

  class Student extends Person {
    classroom;
    point;
    constructor(id, name, address, phone, classroom, point) {
      super(id, name, address, phone);
      this.classroom = classroom;
      this.point = point;

    }
    calculatorPoint(){
      return (this.point *4) / 10
    }
    toString(){
      return `Tên là ${this.name} có địa chỉ là ${this.address}`
    }
  }
