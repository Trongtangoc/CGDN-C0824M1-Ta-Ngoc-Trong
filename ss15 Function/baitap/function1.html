<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<button onclick="bai1AlertMessage()">
  Bài 1: Tạo hàm alertMessage() hiển thị hộp thoại chứa chuỗi  "Xin chao".
</button><br>
<button onclick="bai2Count(2)">Bài 2: Tạo hàm nhận vào một đối số dạng số, tăng giá trị đối
  số đó lên 1 và trả lại giá trị cho lời gọi hàm. </button><br>
<p id="bai2"></p>

<button onclick="bai3Sum(5,6)">Bài 3: Tạo hàm nhận vào hai tham số. Nếu giá trị của
  tham số thứ nhất lớn hơn tham số thứ hai, hiển thị
  hộp thoại thông báo cho người dùng. Nếu giá trị của
  tham số thứ nhất nhỏ hơn hoặc bằng tham số thứ hai,
  trả về tổng của hai tham số.</button>
<p id="bai3"></p>
<button>Bài 4: Thêm các hàm alert() vào những vị trí thích hợp
  trong đoạn mã sau để bạn có thể nhìn thấy giá trị của biến
  result trước và sau lời gọi hàm. Đoạn mã có dạng như sau:</button>

<button>
  Bài 5: Tạo một mảng với bảy phần tử dạng chuỗi
  có giá trị là tên các ngôi sao sau: Polaris,
  Aldebaran, Deneb, Vega, Altair, Dubhe và Regulus.
  Tạo một mảng khác với bảy phần tử dạng chuỗi có
  giá trị là tên các chòm sao tương ứng chứa các
  ngôi sao: Ursa Minor, Tarurus, Cygnus, Lyra, Aquila,
  Ursa Major và Leo. Tiếp theo, tạo một hàm nhận vào một
  tham số dạng chuỗi duy nhất. Trong hàm này, duyệt qua
  mảng thứ nhất để tìm tên ngôi sao. Nếu tìm thấy, trả lại
  giá trị tương ứng với chỉ số đó ở mảng thứ hai. Nói cách khác,
  trả lại tên chòm sao của ngôi sao đó. Trong phần của trang web, dùng hộp thoại prompt để người dùng nhập vào tên của ngôi sao,
sau đó gọi hàm với thông tin đầu
vào. Đừng quên xử lý trong trường
hợp không tìm thấy ngôi sao nào. Cho kết quả hiển thị trên màn hình
</button>
<script>
  function bai1AlertMessage(){
    alert("Hello World")
  }
  function bai2Count(i){
    i++;
    document.getElementById("bai2"). innerHTML = i
  }

  function bai3Sum(a, b) {
    let result = 0;
    if (a > b) {
      alert("Tham số thứ nhất lớn hơn tham số thứ hai");
    } else {
      result = a + b;
      document.getElementById("bai3"). innerHTML = result;
      return result;
    }
  }


</script>
</body>
</html>
