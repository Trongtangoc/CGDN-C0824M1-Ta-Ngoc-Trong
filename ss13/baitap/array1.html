<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luyện tập mảng 01</title>
</head>
<body>
<button onclick="bai1PrinftSoNguyen()">Bài 1- Viết chương trình khởi tạo mảng số nguyên gồm 10 phần tử.
  Chương trình thực hiện tính và hiển thị xem có bao nhiêu số nguyên lớn hơn hoặc bằng 10.</button>
<p id="showResult1"></p>
<p id="daySoLonHon10"></p>
<button onclick="bai2PrinftSoNguyenKhacNhau()">Bài 2- Viết chương trình khởi tạo mảng số nguyên gồm 10 phần tử khác nhau.
  Chương trình hiển thị ra được phần tử có giá trị lớn nhất trong mảng và vị trí của phần tử đó.</button>
<p id="showResult2"></p>
<p id="showResultMax"></p>
<button>Bài 3- Viết chương trình khởi tạo mảng số nguyên.
  Hiển hiện giá trị lớn nhất trong mảng đó. In ra giá trị trung bình của các phần tử trong mảng.</button>
<button>Bài 4- Viết chương trình khởi tạo/nhập vào một mảng số nguyên và đảo ngược các phần tử trong mảng đó.
</button>
<button>Bài 5- Viết chương trình đếm số nguyên âm trong một chuỗi
</button>
<button>Bài 6- Viết chương trình khởi tạo/nhập vào một mảng số nguyên gồm 10 phần tử, nhập/tạo phần tử số nguyên V.
  Chương trình tìm xem V có nằm trong mảng số nguyên không? Nếu V thuộc mảng số
  nguyên thì in ra "V is in the array" còn lại in ra "V is not in the array".</button>
<button>Bài 7- Viết chương trình khởi tạo/nhập vào một mảng số nguyên gồm 10 phần tử, nhập/tạo phần tử số nguyên V.
  Chương trình kiểm tra xem V có thuộc mảng đã cho không, nếu V thuộc mảng đã cho xoá
  V khỏi mảng (Bản chất việc xoá ở đây tức là dịch phần tử ở bên phải V sang vị trí của V, và gán 0 cho phần tử cuối cùng của mảng)</button>
<button>Bài 8- Viết chương trình khởi tạo/nhập vào một mảng số nguyên gồm 10 phần tử.
  Chương trình sắp xếp mảng theo thứ tự giảm dần và hiển thị ra mảng đã được sắp xếp.</button>

<button>Bài 9- Viết chương trình khởi tạo/nhập vào 2 mảng số nguyên gồm 10 phần tử, gọi là mảng a và b.
  Mảng c là một mảng được khai báo gồm 20 phần tử số nguyên. Chương trình sẽ lưu các phần
  tử được nối từ hai mảng b và a vào mảng c. Hiển thị mảng c.</button>

</body>
<script>
  function bai1PrinftSoNguyen(){
    let arraySoNguyen = [];
    let arrayLonHon10 = []
      for(let i = 0; i < 20; i++){
        arraySoNguyen.push(i);
        if(arraySoNguyen[i] >= 10){
          arrayLonHon10.push(arraySoNguyen[i]);
        }
      }

      document.getElementById("showResult1").innerHTML = ` Dãy số nguyên là: ${arraySoNguyen}`;
      document.getElementById("daySoLonHon10").innerHTML = `Dãy số lớn hơn hoặc bằng 10 là : ${arrayLonHon10}`;
  }
  function bai2PrinftSoNguyenKhacNhau(){
    let arraySoNguyen = [];
    let i = 0;
    let max = 0;
    let randomNumber;
    let  tb = 0;

    for (i; i < 10 ; i++){
      randomNumber = Math.floor(Math.random() * 10);
      arraySoNguyen.push(randomNumber);
      if(arraySoNguyen[i] > max){
        max = arraySoNguyen[i];
      }
      tb = tb + arraySoNguyen[i];
    }
    tb = tb/10;
    console.log(tb);


    document.getElementById("showResult2").innerHTML = ` Dãy số nguyên là: ${arraySoNguyen}`;
    document.getElementById("showResultMax").innerHTML = ` Dãy số nguyên là: ${max}`;

  }
</script>
</html>
