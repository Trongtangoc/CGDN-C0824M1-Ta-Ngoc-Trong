<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 600px;
            margin: 30px auto;
            box-shadow: 0px 4px 4px black;
            border: 0.5px solid black;
            border-radius: 7px;
        }
        .container .title {
            background: rgb(37, 80, 74);
        }
        body {
            background: linear-gradient(to right, #4daf54, #3d8880);
        }

        /* Chiều cao, chiều dài của phần tử sẽ bao gồm cả padding mà margin của nó */


        .container h2 {
            padding: 20px;
            text-align: center;
            color: white;
        }

        /* xóa bỏ padding và margin của thẻ ul*/
        ul {
            margin: 0;
            padding: 0;
        }

        /* Định dạng các thẻ li */
        ul li {
            cursor: pointer;
            position: relative;
            padding: 12px 8px 12px 40px;
            background: #eee;
            font-size: 18px;
            transition: 0.2s;
            list-style: none;
        }

        /* thiết lập các phần tử li lẻ một màu nền khác */
        ul li:nth-child(odd) {
            background: #f9f9f9;
        }

        /* Đổi màu nền thẻ li khi nó được hover */
        ul li:hover {
            background: #ddd;
        }

        /* khi thẻ li được chọn thì thêm màu nền và gạch ngang chữ */
        ul li.checked {
            background: #888;
            color: #fff;
            text-decoration: line-through;
        }

        /* Thêm vào trước thẻ li một dấu tích khi thẻ được chọn */
        ul li.checked::before {
            content: '';
            position: absolute;
            border-color: #fff;
            border-style: solid;
            border-width: 0 2px 2px 0;
            top: 10px;
            left: 16px;
            transform: rotate(45deg);
            height: 16px;
            width: 7px;
        }

        /* Định dạng button xóa công việc */
        .close {
            position: absolute;
            right: 0;
            top: 0;
            padding: 12px 16px 12px 16px;
        }

        .close:hover {
            background-color: #f44336;
            color: white;
        }

        /* phần header của danh sách */
        .header {
            background-color: #369ef4;
            padding: 30px 40px;
            color: white;
            text-align: center;
        }

        /* xóa float của các phần trước header */
        .header:after {
            content: "";
            display: table;
            clear: both;
        }

        /* định dạng phần thẻ input */
        input {
            border: none;
            width: 75%;
            padding: 10px;
            float: left;
            font-size: 16px;
        }

        /* định dạng button "thêm" */
        .addBtn {
            padding: 10.5px;
            width: 25%;
            background: #d9d9d9;
            color: #555;
            float: left;
            text-align: center;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .addBtn:hover {
            background-color: #bbb;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="title"><h2>Task Manager</h2></div>
    <div class="content">
        <div id="myDIV" class="header">
            <h2 style="margin:5px">Danh sách những việc cần làm trong năm 2024</h2>
            <input type="text" id="myInput" placeholder="Title...">
            <span onclick="newElement()" class="addBtn">Thêm</span>
<!--            <span onclick="newElement()" class="addBtnList">Thêm</span>-->
        </div>

        <ul id="myResult">
            <li >Xin việc ở Google</li>
            <li >Mua biệt thự</li>
            <li>Cưới vợ</li>
            <li>Mua xe hơi</li>
            <li>Sinh con</li>
            <li>Đi du lịch vòng quanh thế giới</li>
        </ul>
    </div>
</div>
</body>
<script>
    // Hàm tạo nút xóa cho mỗi phần tử li
    function addCloseButton(li) {
        let span = document.createElement("SPAN");
        let txt = document.createTextNode("\u00D7");
        span.className = "close";
        span.appendChild(txt);
        li.appendChild(span);
        span.onclick = function () {
            removeItem(this);
        };
    }

    // Hàm xóa phần tử
    function removeItem(span) {
        let li = span.parentElement;
        li.style.display = "none";
    }

    // Hàm đánh dấu phần tử đã hoàn thành (toggle checked)
    function toggleChecked(ev) {
        if (ev.target.tagName === 'LI') {
            ev.target.classList.toggle('checked');
        }
    }

    // Hàm thêm công việc mới
    function newElement() {
        let li = document.createElement("li");
        let inputValue = document.getElementById("myInput").value;
        let t = document.createTextNode(inputValue);
        li.appendChild(t);

        if (inputValue === '') {
            alert("You must write something!");
        } else {
            document.getElementById("myUL").appendChild(li);
            addCloseButton(li);
            addEditButton(li); // Thêm nút sửa cho mỗi công việc
        }

        document.getElementById("myInput").value = "";  // Reset giá trị input
    }

    // Hàm tạo nút sửa cho mỗi phần tử li
    function addEditButton(li) {
        let editSpan = document.createElement("SPAN");
        let editText = document.createTextNode("Edit");
        editSpan.className = "edit";
        editSpan.appendChild(editText);
        li.appendChild(editSpan);

        editSpan.onclick = function () {
            editItem(this);
        };
    }

    // Hàm sửa phần tử công việc
    function editItem(editSpan) {
        let li = editSpan.parentElement;
        let currentText = li.firstChild.nodeValue;
        let newText = prompt("Chỉnh sửa công việc:", currentText);

        if (newText !== null && newText.trim() !== '') {
            li.firstChild.nodeValue = newText;
        }
    }

    // Gán sự kiện xóa và sửa cho các phần tử đã có trong danh sách ban đầu
    function initializeList() {
        let myNodelist = document.getElementsByTagName("LI");

        for (let i = 0; i < myNodelist.length; i++) {
            addCloseButton(myNodelist[i]);
            addEditButton(myNodelist[i]); // Thêm nút sửa cho các mục đã có
        }
    }

    // Khởi tạo sự kiện cho danh sách ul
    function initializeEventListeners() {
        let list = document.querySelector('ul');
        list.addEventListener('click', toggleChecked, false);
    }

    // Chạy khi tải trang
    window.onload = function() {
        initializeList();
        initializeEventListeners();
    };

</script>

</html>
